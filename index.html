<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GreenShop — Головна</title>
    <link rel="stylesheet" href="стилі/style.css">
</head>
<body>

    <header class="header">
        <div class="container">
            <div class="header-inner">
                <a href="index.html" class="logo">
                    <img src="картинки/logo.png" alt="Logo" class="logo-img">
                    <span class="logo-text">GREENSHOP</span>
                </a>
                <nav class="nav">
                    <a href="index.html" class="nav-link active">Home</a>
                    <a href="#" class="nav-link">Shop</a>
                    <a href="#" class="nav-link">Plant Care</a>
                    <a href="#" class="nav-link">Blogs</a>
                </nav>
                <div class="header-actions">
                    <a href="registration.html" class="login-btn">Login</a>
                </div>
            </div>
        </div>
    </header>

    <section class="hero">
        <div class="container">
            <div class="hero-inner">
                <div class="hero-content">
                    <p class="hero-subtitle">Welcome to GreenShop</p>
                    <h1 class="hero-title">
                        Let’s Make a <br> 
                        Better <span class="highlight">Planet</span>
                    </h1>
                    <p class="hero-description">
                        We are an online plant shop offering a wide range of cheap and trendy plants.
                    </p>
                    <button class="shop-now-btn">SHOP NOW</button>
                </div>
                
                <div class="hero-image">
                    <div class="plants-box">
                        <img src="картинки/hero-plant-small.png" alt="Small" class="p-small">
                        <img src="картинки/hero-plant-big.png" alt="Big" class="p-big">
                    </div>
                </div>
            </div>
        </div>
    </section>

</body>
</html>
