<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>GreenShop — Головна</title>

    <!-- FONT -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="styles/style.css">
</head>

<body>

<header class="header">
    <div class="container">
        <div class="header-inner">

            <a href="index.html" class="logo">
                <img src="images/logo.png" alt="Logo" class="logo-img">
                <span class="logo-text">GREENSHOP</span>
            </a>

            <nav class="nav">
                <a href="index.html" class="nav-link active">Home</a>
                <a href="#" class="nav-link">Shop</a>
                <a href="#" class="nav-link">Plant Care</a>
                <a href="#" class="nav-link">Blogs</a>
            </nav>

            <div class="header-actions">
                <a href="registration.html" class="login-btn">
                    <img src="images/login-icon.png" class="login-icon">
                        Login
                </a>
            </div>

        </div>
    </div>
</header>


<section class="hero">
    <div class="container">
        <div class="hero-inner">

            <div class="hero-content">

                <p class="hero-subtitle">Welcome to GreenShop</p>

                <h1 class="hero-title">
                    Let's Make a Better <span class="highlight">Planet</span>
                </h1>

                <p class="hero-description">
                    We are an online plant shop offering a wide range of cheap and trendy plants. Use our plants to create an unique Urban Jungle. Order your favorite plants!
                </p>

                <button class="shop-now-btn">SHOP NOW</button>

            </div>

            <div class="hero-image">
                <div class="plants-box">

                    <img src="images/hero-plant-small.png" alt="Small plant" class="p-small">
                    <img src="images/hero-plant-big.png" alt="Big plant" class="p-big">

                </div>
            </div>

        </div>
    </div>
</section>

</body>
</html>
