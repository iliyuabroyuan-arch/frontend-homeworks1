<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Registration</title>

<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f6f6f6;
}

.modal {
    width: 500px;
    margin: 80px auto;
    background: #fff;
    border-radius: 10px;
    padding: 40px 0;
    text-align: center;
}

.form-inner {
    width: 300px;
    margin: 0 auto;
}

input {
    width: 100%;
    height: 40px;
    padding: 0 10px;
    margin-bottom: 15px;
    border: 1px solid #ddd;
    border-radius: 6px;
}

/* password eye */
.password-box {
    position: relative;
}

.password-box input {
    padding-right: 35px;
}

.eye {
    position: absolute;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
    width: 18px;
    height: 18px;
    cursor: pointer;
    opacity: 0.8;
}

.main-btn {
    width: 100%;
    height: 45px;
    background: #46A358;
    color: #fff;
    border: none;
    border-radius: 6px;
    font-weight: bold;
    cursor: pointer;
    margin-top: 10px;
}
</style>
</head>

<body>

<div class="modal">

<div class="form-inner">

<form>

<input type="text" placeholder="Username">
<input type="email" placeholder="Email">

<div class="password-box">
    <input type="password" placeholder="Password">
    <img src="images/eye-off.png" class="eye" onclick="toggle(this)">
</div>

<div class="password-box">
    <input type="password" placeholder="Confirm Password">
    <img src="images/eye-off.png" class="eye" onclick="toggle(this)">
</div>

<button class="main-btn">Register</button>

</form>

</div>

</div>

<script>
function toggle(icon) {
    const input = icon.parentElement.querySelector("input");

    if (input.type === "password") {
        input.type = "text";
        icon.src = "images/eye.png";
    } else {
        input.type = "password";
        icon.src = "images/eye-off.png";
    }
}
</script>

</body>
</html>
