<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GreenShop — Реєстрація</title>
    <link rel="stylesheet" href="стилі/style.css">
</head>
<body>

    <header class="header">
        <div class="container">
            <div class="header-inner">
                <a href="index.html" class="logo">
                    <img src="картинки/logo.png" alt="Logo" class="logo-img">
                    <span class="logo-text">GREENSHOP</span>
                </a>
                <nav class="nav">
                    <a href="index.html" class="nav-link">Home</a>
                    <a href="#" class="nav-link">Shop</a>
                </nav>
                <div class="header-actions">
                    <a href="registration.html" class="login-btn">Login</a>
                </div>
            </div>
        </div>
    </header>

    <div class="modal">
        <div class="tabs">
            <span>Login</span> | <span class="active">Register</span>
        </div>
        <p class="description">Enter your email and password to register.</p>
        
        <form class="register-form">
            <input type="text" placeholder="Username">
            <input type="email" placeholder="Enter your email address">
            <input type="password" placeholder="Password">
            <input type="password" placeholder="Confirm Password">
            <button type="submit" class="register-btn">Register</button>
        </form>

        <div class="divider"><span>Or register with</span></div>

        <div class="social-buttons">
            <button class="social-btn">
                <img src="картинки/google.png" alt="Google"> Continue with Google
            </button>
            <button class="social-btn">
                <img src="картинки/facebook.png" alt="Facebook"> Continue with Facebook
            </button>
        </div>
    </div>

</body>
</html>
